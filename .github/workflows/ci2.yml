name: CI Sorting Algorithms

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    name: Unit Tests - Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Debug - Check file structure
        run: |
          echo "Current directory: $(pwd)"
          echo "Listing all Python files:"
          find . -name "*.py" -type f | head -20

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run unit tests
        run: |
          # Navigate to test directory and run tests
          if [ -d "Assignment1_Юниттесты" ]; then
            cd "Assignment1_Юниттесты"
            pytest all_unit_test.py -v --tb=short
          else
            echo "Error: Assignment1_Юниттесты directory not found!"
            echo "Current directory contents:"
            ls -la
            exit 1
          fi