name: CI Base85

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: unit test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Debug - List files
        run: |
          echo "Current directory: $(pwd)"
          echo "Contents of root:"
          ls -la
          echo "Contents of base85 directory:"
          ls -la base85/ || echo "base85 directory not found!"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest beartype

      - name: Run unit tests with pytest
        run: |
          # Assurez-vous que le fichier test existe
          if [ -f base85/base85_test.py ]; then
            pytest base85/base85_test.py -v --tb=short
          else
            echo "Error: base85_test.py not found!"
            exit 1
          fi

      - name: Run integration tests (bash)
        run: |
          chmod +x base85/base85.py
          chmod +x base85/integration_test.sh
          ./base85/integration_test.sh